<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(to right,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#fff;
padding:20px;
border-radius:15px;
text-align:center;
width:300px;
box-shadow:0 0 10px gray;
}
input{
width:80%;
padding:10px;
margin:10px 0;
}
button{
padding:10px 20px;
background:#2196f3;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
#result{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="box">
<h2>🌤 Weather App</h2>

<input type="text" id="city" placeholder="Enter City">
<br>
<button onclick="weather()">Check Weather</button>

<div id="result"></div>
</div>

<script>
function weather(){
let city=document.getElementById("city").value;

document.getElementById("result").innerHTML=
"<h3>"+city+"</h3>"+
"<p>🌡 Temperature: 29°C</p>"+
"<p>☁ Weather: Sunny</p>"+
"<p>💧 Humidity: 65%</p>"+
"<p>🌬 Wind: 10 km/h</p>";
}
</script>

</body>
</html>
